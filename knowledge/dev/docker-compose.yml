services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: KnowLedge
      POSTGRES_PASSWORD: dev123
      POSTGRES_DB: knowdb
    ports:
      - "5432:5432"
    volumes:
      - kv_tenant_local_data:/var/lib/postgresql/data
      # Order matters: Better-Auth-shaped tables first, then the app schema
      # that references "user"(id) — Story 2.1 AC#6 / Story 7.1 AC#3.
      - ./init-db/00_better_auth.sql:/docker-entrypoint-initdb.d/00_better_auth.sql:ro
      - ../Database/migrations/0001_business_schema.sql:/docker-entrypoint-initdb.d/01_business_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U KnowLedge -d knowdb"]
      interval: 2s
      timeout: 3s
      retries: 30

  gateway:
    build: ./mock-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://KnowLedge:dev123@postgres:5432/knowdb
      TENANT_ID: local-dev
      DEV_ORIGIN: http://localhost:5173
      PORT: 8787
    ports:
      - "8787:8787"
    volumes:
      - ./mock-gateway/src:/app/src:ro

volumes:
  kv_tenant_local_data: